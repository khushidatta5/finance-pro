<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Finance Pro — Expenses</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet"/>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet"/>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet"/>
    <link href="/css/styles.css" rel="stylesheet"/>
</head>
<body>
<div class="sidebar" id="sidebar">
    <div class="sidebar-brand">
        <div class="brand-icon">FP</div><span class="brand-name">Finance Pro</span>
        <button class="sidebar-close d-lg-none" onclick="closeSidebar()"><i class="bi bi-x-lg"></i></button>
    </div>
    <nav class="sidebar-nav">
        <a href="/dashboard"    class="nav-item"><i class="bi bi-grid-1x2-fill"></i><span>Dashboard</span></a>
        <a href="/analytics"    class="nav-item"><i class="bi bi-bar-chart-line-fill"></i><span>Analytics</span></a>
        <a href="/income"       class="nav-item"><i class="bi bi-arrow-up-circle-fill"></i><span>Income Streams</span></a>
        <a href="/transactions" class="nav-item"><i class="bi bi-arrow-left-right"></i><span>Transactions</span></a>
        <a href="/expenses"     class="nav-item active"><i class="bi bi-credit-card-fill"></i><span>Expenses</span></a>
        <a href="/settings"     class="nav-item"><i class="bi bi-gear-fill"></i><span>Settings</span></a>
    </nav>
    <div class="sidebar-footer">
        <div class="user-avatar-sm" th:text="${user.fullName != null ? #strings.substring(user.fullName,0,1) : 'U'}">A</div>
        <div class="flex-grow-1">
            <div class="fw-600 small" th:text="${user.fullName ?: user.username}">Alex</div>
            <div class="text-muted" style="font-size:.72rem;" th:text="${user.email}">email</div>
        </div>
        <a href="/logout" class="text-muted"><i class="bi bi-box-arrow-right"></i></a>
    </div>
</div>
<div class="sidebar-overlay" id="overlay" onclick="closeSidebar()"></div>
<main class="main-content">
    <div class="topbar">
        <button class="topbar-toggle d-lg-none" onclick="openSidebar()"><i class="bi bi-list"></i></button>
        <div class="topbar-left"><h4 class="mb-0 fw-700">Expenses</h4></div>
        <div class="topbar-right">
            <button class="btn btn-primary rounded-pill px-4" data-bs-toggle="modal" data-bs-target="#addExpenseModal">
                <i class="bi bi-plus-lg me-1"></i>Add Expense
            </button>
        </div>
    </div>
    <div class="page-content">
        <div th:if="${success}" class="alert alert-success alert-dismissible fade show rounded-3 mb-4">
            <i class="bi bi-check-circle-fill me-2"></i><span th:text="${success}"></span>
            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>
        <div th:if="${error}" class="alert alert-danger alert-dismissible fade show rounded-3 mb-4">
            <i class="bi bi-exclamation-triangle-fill me-2"></i><span th:text="${error}"></span>
            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>

        <div class="card-custom p-4">
            <div class="d-flex justify-content-between align-items-center mb-3">
                <div class="section-title mb-0">All Expenses (<span th:text="${#lists.size(expenses)}">0</span>)</div>
            </div>
            <div class="table-responsive">
                <table class="table table-hover align-middle" id="expenseTable">
                    <thead>
                        <tr>
                            <th>Title</th>
                            <th>Amount</th>
                            <th>Category</th>
                            <th>Date</th>
                            <th>Notes</th>
                            <th class="text-center">Actions</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="exp : ${expenses}">
                            <td class="fw-500" th:text="${exp.title}">Grocery</td>
                            <td class="fw-600 text-danger">₹<span th:text="${#numbers.formatDecimal(exp.amount,1,'COMMA',2,'POINT')}">0</span></td>
                            <td>
                                <span class="category-pill"
                                      th:classappend="${exp.category == 'FOOD' ? 'pill-food' : (exp.category == 'TRAVEL' ? 'pill-travel' : (exp.category == 'SHOPPING' ? 'pill-shopping' : 'pill-bills'))}"
                                      th:text="${exp.category}">FOOD</span>
                            </td>
                            <td class="text-muted" th:text="${exp.expenseDate}">2024-01-01</td>
                            <td class="text-muted small" th:text="${exp.notes ?: '—'}">—</td>
                            <td class="text-center">
                                <button type="button"
                                        class="btn btn-sm btn-outline-primary me-1 rounded-pill js-edit-expense"
                                        th:attr="data-id=${exp.id},
                                                 data-title=${exp.title},
                                                 data-amount=${exp.amount},
                                                 data-category=${exp.category},
                                                 data-date=${exp.expenseDate},
                                                 data-notes=${exp.notes}">
                                    <i class="bi bi-pencil"></i>
                                </button>
                                <form th:action="@{/expenses/delete/{id}(id=${exp.id})}" method="post" class="d-inline"
                                      onsubmit="return confirm('Delete this expense?')">
                                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                                    <button type="submit" class="btn btn-sm btn-outline-danger rounded-pill"><i class="bi bi-trash"></i></button>
                                </form>
                            </td>
                        </tr>
                        <tr th:if="${#lists.isEmpty(expenses)}">
                            <td colspan="6" class="text-center text-muted py-5">
                                <i class="bi bi-inbox fs-1 d-block mb-2"></i>No expenses yet. Add your first expense!
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</main>

<!-- Add Expense Modal -->
<div class="modal fade" id="addExpenseModal" tabindex="-1">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content rounded-4 border-0 shadow-lg">
            <div class="modal-header border-0 pb-0">
                <h5 class="modal-title fw-700"><i class="bi bi-plus-circle me-2 text-primary"></i>Add Expense</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <form th:action="@{/expenses/add}" method="post">
                <div class="modal-body">
                    <div class="mb-3">
                        <label class="form-label fw-500">Title *</label>
                        <input type="text" name="title" class="form-control" placeholder="e.g. Grocery Shopping" required maxlength="100"/>
                    </div>
                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label class="form-label fw-500">Amount (₹) *</label>
                            <div class="input-group">
                                <span class="input-group-text">₹</span>
                                <input type="number" name="amount" class="form-control"
                                       step="0.01" min="0.01" placeholder="0.00" required
                                       inputmode="decimal"
                                       oninput="this.value = this.value.replace(/^-+/, '');"/>
                            </div>
                            <div class="form-text text-muted small">Enter a positive amount in rupees.</div>
                        </div>
                        <div class="col-md-6 mb-3">
                            <label class="form-label fw-500">Category *</label>
                            <select name="category" class="form-select" required>
                                <option value="">Select category</option>
                                <option value="FOOD">Food</option>
                                <option value="TRAVEL">Travel</option>
                                <option value="SHOPPING">Shopping</option>
                                <option value="BILLS">Bills</option>
                            </select>
                        </div>
                    </div>
                    <div class="mb-3">
                        <label class="form-label fw-500">Date *</label>
                        <input type="date" name="expenseDate" class="form-control" required/>
                    </div>
                    <div class="mb-3">
                        <label class="form-label fw-500">Notes</label>
                        <textarea name="notes" class="form-control" rows="2" placeholder="Optional notes..."></textarea>
                    </div>
                </div>
                <div class="modal-footer border-0">
                    <button type="button" class="btn btn-light rounded-pill px-4" data-bs-dismiss="modal">Cancel</button>
                    <button type="submit" class="btn btn-primary rounded-pill px-4"><i class="bi bi-check-lg me-1"></i>Save Expense</button>
                </div>
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
            </form>
        </div>
    </div>
</div>

<!-- Edit Expense Modal -->
<div class="modal fade" id="editExpenseModal" tabindex="-1">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content rounded-4 border-0 shadow-lg">
            <div class="modal-header border-0 pb-0">
                <h5 class="modal-title fw-700"><i class="bi bi-pencil-square me-2 text-warning"></i>Edit Expense</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <form id="editExpenseForm" method="post">
                <div class="modal-body">
                    <div class="mb-3">
                        <label class="form-label fw-500">Title *</label>
                        <input type="text" name="title" id="editTitle" class="form-control" required maxlength="100"/>
                    </div>
                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label class="form-label fw-500">Amount (₹) *</label>
                            <div class="input-group">
                                <span class="input-group-text">₹</span>
                                <input type="number" name="amount" id="editAmount" class="form-control"
                                       step="0.01" min="0.01" required
                                       oninput="this.value = this.value.replace(/^-+/, '');"/>
                            </div>
                        </div>
                        <div class="col-md-6 mb-3">
                            <label class="form-label fw-500">Category *</label>
                            <select name="category" id="editCategory" class="form-select" required>
                                <option value="FOOD">Food</option>
                                <option value="TRAVEL">Travel</option>
                                <option value="SHOPPING">Shopping</option>
                                <option value="BILLS">Bills</option>
                            </select>
                        </div>
                    </div>
                    <div class="mb-3">
                        <label class="form-label fw-500">Date *</label>
                        <input type="date" name="expenseDate" id="editDate" class="form-control" required/>
                    </div>
                    <div class="mb-3">
                        <label class="form-label fw-500">Notes</label>
                        <textarea name="notes" id="editNotes" class="form-control" rows="2"></textarea>
                    </div>
                </div>
                <div class="modal-footer border-0">
                    <button type="button" class="btn btn-light rounded-pill px-4" data-bs-dismiss="modal">Cancel</button>
                    <button type="submit" class="btn btn-warning rounded-pill px-4 text-white"><i class="bi bi-check-lg me-1"></i>Update</button>
                </div>
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
            </form>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="/js/main.js"></script>
<script>
// Bind the edit modal via data-* attributes — the previous inline onclick
// concatenation broke any time a title or notes value contained a quote.
document.querySelectorAll('.js-edit-expense').forEach(btn => {
    btn.addEventListener('click', () => {
        const d = btn.dataset;
        document.getElementById('editExpenseForm').action = '/expenses/edit/' + d.id;
        document.getElementById('editTitle').value    = d.title || '';
        document.getElementById('editAmount').value   = d.amount || '';
        document.getElementById('editCategory').value = d.category || '';
        document.getElementById('editDate').value     = d.date || '';
        document.getElementById('editNotes').value    = d.notes || '';
        new bootstrap.Modal(document.getElementById('editExpenseModal')).show();
    });
});
</script>
</body>
</html>
