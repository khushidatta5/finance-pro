<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Finance Pro — Register</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet"/>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet"/>
    <link href="/css/styles.css" rel="stylesheet"/>
    <style>
        body { background: linear-gradient(135deg,#667eea 0%,#764ba2 100%); min-height:100vh; }
        .auth-card { border-radius:20px; box-shadow:0 25px 50px rgba(0,0,0,.2); border:none; }
        .brand-logo { width:48px;height:48px;background:linear-gradient(135deg,#667eea,#764ba2);border-radius:12px;display:flex;align-items:center;justify-content:center;color:#fff;font-size:1.5rem;font-weight:700; }
        .form-control { border-radius:10px;border:2px solid #e2e8f0;padding:12px 16px;transition:all .2s; }
        .form-control:focus { border-color:#667eea;box-shadow:0 0 0 3px rgba(102,126,234,.15); }
        .btn-primary-custom { background:linear-gradient(135deg,#667eea,#764ba2);border:none;border-radius:10px;padding:12px;font-weight:600;transition:all .3s; }
        .btn-primary-custom:hover { transform:translateY(-2px);box-shadow:0 8px 25px rgba(102,126,234,.4); }
    </style>
</head>
<body class="d-flex align-items-center justify-content-center py-5" style="font-family:'Inter',sans-serif;">
<div class="container">
    <div class="row justify-content-center">
        <div class="col-12 col-sm-10 col-md-8 col-lg-6">
            <div class="card auth-card p-4 p-md-5">
                <div class="text-center mb-4">
                    <div class="brand-logo mx-auto mb-3">FP</div>
                    <h2 class="fw-bold mb-1">Create Account</h2>
                    <p class="text-muted">Join Finance Pro and take control of your finances</p>
                </div>

                <div th:if="${error}" class="alert alert-danger rounded-3">
                    <i class="bi bi-exclamation-triangle-fill me-2"></i>
                    <span th:text="${error}"></span>
                </div>

                <form th:action="@{/register}" method="post">
                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label class="form-label fw-500">Full Name</label>
                            <input type="text" name="fullName" class="form-control" placeholder="Alex Johnson" required/>
                        </div>
                        <div class="col-md-6 mb-3">
                            <label class="form-label fw-500">Username</label>
                            <input type="text" name="username" class="form-control" placeholder="alexj" required minlength="3"/>
                        </div>
                    </div>
                    <div class="mb-3">
                        <label class="form-label fw-500">Email Address</label>
                        <input type="email" name="email" class="form-control" placeholder="alex@example.com" required/>
                    </div>
                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label class="form-label fw-500">Password</label>
                            <input type="password" name="password" class="form-control" placeholder="Min 6 characters" required minlength="6"/>
                        </div>
                        <div class="col-md-6 mb-4">
                            <label class="form-label fw-500">Confirm Password</label>
                            <input type="password" name="confirmPassword" class="form-control" placeholder="Repeat password" required/>
                        </div>
                    </div>
                    <button type="submit" class="btn btn-primary-custom text-white w-100 mb-3">
                        <i class="bi bi-person-plus me-2"></i>Create Account
                    </button>
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                </form>
                <p class="text-center text-muted mb-0">
                    Already have an account?
                    <a href="/login" class="text-decoration-none fw-600" style="color:#667eea;">Sign in</a>
                </p>
            </div>
        </div>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
