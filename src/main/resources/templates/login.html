<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Finance Pro — Login</title>
    <link rel="preconnect" href="https://fonts.googleapis.com"/>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet"/>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet"/>
    <link href="/css/styles.css" rel="stylesheet"/>
    <style>
        body { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; }
        .auth-card { border-radius: 20px; box-shadow: 0 25px 50px rgba(0,0,0,0.2); border: none; }
        .brand-logo { width: 48px; height: 48px; background: linear-gradient(135deg,#667eea,#764ba2); border-radius: 12px; display: flex; align-items: center; justify-content: center; color: white; font-size: 1.5rem; font-weight: 700; }
        .form-control { border-radius: 10px; border: 2px solid #e2e8f0; padding: 12px 16px; transition: all .2s; }
        .form-control:focus { border-color: #667eea; box-shadow: 0 0 0 3px rgba(102,126,234,0.15); }
        .btn-primary-custom { background: linear-gradient(135deg,#667eea,#764ba2); border: none; border-radius: 10px; padding: 12px; font-weight: 600; letter-spacing: .5px; transition: all .3s; }
        .btn-primary-custom:hover { transform: translateY(-2px); box-shadow: 0 8px 25px rgba(102,126,234,0.4); }
        .divider { position: relative; text-align: center; }
        .divider::before { content: ''; position: absolute; left: 0; top: 50%; width: 45%; height: 1px; background: #e2e8f0; }
        .divider::after  { content: ''; position: absolute; right: 0; top: 50%; width: 45%; height: 1px; background: #e2e8f0; }
        .floating-label label { font-weight: 500; color: #64748b; }
    </style>
</head>
<body class="d-flex align-items-center justify-content-center" style="font-family:'Inter',sans-serif;">
<div class="container">
    <div class="row justify-content-center">
        <div class="col-12 col-sm-10 col-md-7 col-lg-5">
            <div class="card auth-card p-4 p-md-5">
                <!-- Brand -->
                <div class="text-center mb-4">
                    <div class="brand-logo mx-auto mb-3">FP</div>
                    <h2 class="fw-700 mb-1" style="font-weight:700;">Welcome back</h2>
                    <p class="text-muted">Sign in to your Finance Pro account</p>
                </div>

                <!-- Alerts -->
                <div th:if="${errorMsg}" class="alert alert-danger alert-dismissible fade show rounded-3" role="alert">
                    <i class="bi bi-exclamation-triangle-fill me-2"></i>
                    <span th:text="${errorMsg}"></span>
                    <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                </div>
                <div th:if="${logoutMsg}" class="alert alert-info alert-dismissible fade show rounded-3">
                    <i class="bi bi-info-circle-fill me-2"></i>
                    <span th:text="${logoutMsg}"></span>
                    <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                </div>
                <div th:if="${success}" class="alert alert-success alert-dismissible fade show rounded-3">
                    <i class="bi bi-check-circle-fill me-2"></i>
                    <span th:text="${success}"></span>
                    <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                </div>

                <!-- Login Form -->
                <form th:action="@{/login}" method="post">
                    <div class="mb-3">
                        <label class="form-label fw-500" style="font-weight:500;">Username</label>
                        <div class="input-group">
                            <span class="input-group-text" style="border-radius:10px 0 0 10px;border:2px solid #e2e8f0;border-right:none;"><i class="bi bi-person text-muted"></i></span>
                            <input type="text" name="username" class="form-control" style="border-left:none;border-radius:0 10px 10px 0;" placeholder="Enter username" required/>
                        </div>
                    </div>
                    <div class="mb-4">
                        <label class="form-label fw-500" style="font-weight:500;">Password</label>
                        <div class="input-group">
                            <span class="input-group-text" style="border-radius:10px 0 0 10px;border:2px solid #e2e8f0;border-right:none;"><i class="bi bi-lock text-muted"></i></span>
                            <input type="password" name="password" id="passwordInput" class="form-control" style="border-left:none;border-right:none;border-radius:0;" placeholder="Enter password" required/>
                            <button type="button" class="input-group-text" onclick="togglePassword()" style="border-radius:0 10px 10px 0;border:2px solid #e2e8f0;border-left:none;background:white;cursor:pointer;">
                                <i class="bi bi-eye" id="eyeIcon"></i>
                            </button>
                        </div>
                    </div>
                    <div class="d-flex justify-content-between align-items-center mb-4">
                        <div class="form-check">
                            <input class="form-check-input" type="checkbox" name="remember-me" id="rememberMe"/>
                            <label class="form-check-label text-muted" for="rememberMe">Remember me</label>
                        </div>
                    </div>
                    <button type="submit" class="btn btn-primary-custom text-white w-100 mb-3">
                        <i class="bi bi-box-arrow-in-right me-2"></i>Sign In
                    </button>
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
                </form>

                <div class="divider mb-3"><span class="px-3 text-muted small">or</span></div>

                <p class="text-center text-muted mb-0">
                    Don't have an account?
                    <a href="/register" class="text-decoration-none fw-600" style="color:#667eea;font-weight:600;">Sign up free</a>
                </p>

                <!-- Demo credentials hint -->
                <div class="mt-4 p-3 rounded-3" style="background:#f8fafc;border:1px dashed #cbd5e1;">
                    <p class="text-muted small mb-1"><i class="bi bi-key me-1"></i><strong>Demo credentials:</strong></p>
                    <p class="text-muted small mb-0">Username: <code>admin</code> &nbsp;|&nbsp; Password: <code>admin123</code></p>
                </div>
            </div>
        </div>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script>
function togglePassword() {
    const inp = document.getElementById('passwordInput');
    const ico = document.getElementById('eyeIcon');
    if (inp.type === 'password') { inp.type = 'text'; ico.className = 'bi bi-eye-slash'; }
    else { inp.type = 'password'; ico.className = 'bi bi-eye'; }
}
</script>
</body>
</html>
