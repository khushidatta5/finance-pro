# ===================================
# Finance Pro - Application Properties
# ===================================

# Server
server.port=8080
server.servlet.context-path=/

spring.application.name=Finance Pro

# ===================================
# JSON Data Store
# ===================================
# Path (relative to the working dir or absolute) where the single project
# data file lives. All persistence — users, expenses, income, transactions,
# savings goals — is stored here in a single JSON document.
app.data.file=project.json

# Pretty-print the JSON file when writing (handy for inspecting / hand-editing).
app.data.pretty-print=true

# ===================================
# Thymeleaf
# ===================================
spring.thymeleaf.cache=false
spring.thymeleaf.encoding=UTF-8
spring.thymeleaf.mode=HTML
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html

# ===================================
# Logging
# ===================================
logging.level.com.financepro=INFO
logging.level.org.springframework.security=WARN

# ===================================
# Jackson JSON
# ===================================
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.date-format=yyyy-MM-dd
